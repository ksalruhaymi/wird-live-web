{% load static i18n %}
{% get_current_language as CURRENT_LANGUAGE %}

<div id="qurraModal"
     class="fixed inset-0 z-[10000] bg-black/40 z-40 hidden items-center justify-center">

  <div class="w-full max-w-5xl mx-4 bg-white rounded-3xl shadow-2xl border border-gray-100 relative"
       dir-text>

    <div class="px-6 pt-6 pb-3 border-b">
      <div class="flex items-center justify-between gap-4">

        <div class="flex items-center gap-3">
          <div class="flex items-center justify-center text-emerald-600 text-3xl">
            <i class="bi bi-headphones"></i>
          </div>

          <span class="font-semibold text-base md:text-lg text-gray-900">
            {% trans "reciters" %}
            {% if current_mushaf_label %}
              <span class="text-sm text-gray-500">
                 {% translate current_mushaf_label %}
              </span>
            {% endif %}
          </span>
        </div>

        <div class="relative w-40 md:w-64">
          <input id="qurraSearch"
                 type="text"
                 placeholder="{% trans 'search_reciter' %}"
                 class="w-full border rounded-full pl-8 pr-3 py-1.5 text-sm
                        focus:outline-none focus:ring-1 focus:ring-emerald-500 focus:border-emerald-500">
          <span class="absolute left-2 top-1/2 -translate-y-1/2 text-gray-400 text-sm">
            🔍
          </span>
        </div>

        <button onclick="toggleQurraModal()"
                class="text-3xl md:text-4xl leading-none text-gray-500 hover:text-black transition">
          ×
        </button>

      </div>
    </div>

    <div class="px-4 pb-6 pt-4">
      <div id="qurraGridWrapper" class="w-full">
        <div id="qurraGrid"
             class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-8
                    gap-y-6 gap-x-4 text-center place-content-start">

          {% for qari in qurra %}
          <button
             type="button"
             data-folder="{{ qari.code }}"
             data-qari-code="{{ qari.code }}"
             data-qari-image="{% if qari.image %}{{ MEDIA_URL }}images/qurra/{{ qari.image }}{% else %}/static/images/wird.svg{% endif %}"
             data-qari-name="{% if CURRENT_LANGUAGE|slice:':2' == 'ar' or CURRENT_LANGUAGE|slice:':2' == 'ur' %}{{ qari.name_ar }}{% else %}{{ qari.name_en }}{% endif %}"
             data-qari-search="{% if CURRENT_LANGUAGE|slice:':2' == 'ar' or CURRENT_LANGUAGE|slice:':2' == 'ur' %}{{ qari.name_ar }}{% else %}{{ qari.name_en }}{% endif %}"
             class="quran-qari-opt flex flex-col items-center group focus:outline-none">

            <img
              src="{{ MEDIA_URL }}images/qurra/{{ qari.image }}"
              alt="{% if CURRENT_LANGUAGE|slice:':2' == 'ar' or CURRENT_LANGUAGE|slice:':2' == 'ur' %}{{ qari.name_ar }}{% else %}{{ qari.name_en }}{% endif %}"
              class="w-12 h-12 md:w-16 md:h-16 rounded-full object-cover
                    border border-gray-200 shadow-sm
                    group-hover:border-emerald-400 transition">

            <span class="mt-2 text-xs md:text-sm text-gray-800 group-hover:text-emerald-700 transition">
              {% if CURRENT_LANGUAGE|slice:':2' == 'ar' or CURRENT_LANGUAGE|slice:':2' == 'ur' %}
                {{ qari.name_ar }}
              {% else %}
                {{ qari.name_en }}
              {% endif %}
            </span>

          </button>
          {% endfor %}

        </div>
      </div>
    </div>

  </div>
</div>
