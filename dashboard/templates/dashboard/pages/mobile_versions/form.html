{% extends "dashboard/layouts/base.html" %}

{% block dashboard_content %}
<div class="max-w-3xl mx-auto space-y-5" dir-text>

  <div class="site-card p-4">
    <div class="flex items-center justify-between gap-3">
      <h1 class="text-base font-extrabold site-text">{{ title }}</h1>
      <a href="{% url 'dashboard:mobile_version_list' %}" class="text-[12px] site-link-primary font-semibold hover:underline">
        <i class="bi bi-arrow-right ml-1"></i>
        العودة للقائمة
      </a>
    </div>
  </div>

  <div class="site-card p-5 md:p-6">
    <form method="post" class="space-y-5">
      {% csrf_token %}
      <input type="hidden" name="simplified_form" value="1">

      <div class="space-y-1.5">
        <label class="block text-sm font-semibold site-text">المنصة</label>
        <select name="platform" class="w-full rounded-lg border site-border px-3 py-2 text-sm site-text"
                {% if mode == 'edit' %}disabled{% endif %}>
          {% for value, label in platform_choices %}
          <option value="{{ value }}" {% if initial.platform == value %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
        {% if mode == 'edit' %}
        <input type="hidden" name="platform" value="{{ initial.platform }}">
        {% endif %}
      </div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="space-y-1.5">
          <label class="block text-sm font-semibold site-text">آخر إصدار</label>
          <input type="text" name="version_name" value="{{ initial.version_name }}" placeholder="1.0.1" required
                 class="w-full rounded-lg border site-border px-3 py-2 text-sm site-text" dir="ltr">
        </div>
        <div class="space-y-1.5">
          <label class="block text-sm font-semibold site-text">رقم Build</label>
          <input type="number" name="build_number" value="{{ initial.build_number }}" min="1" required
                 class="w-full rounded-lg border site-border px-3 py-2 text-sm site-text" dir="ltr">
        </div>
        <div class="space-y-1.5">
          <label class="block text-sm font-semibold site-text">أقل Build مسموح</label>
          <input type="number" name="minimum_build_number" value="{{ initial.minimum_build_number }}" min="1"
                 placeholder="نفس رقم البناء إن تُرك فارغًا"
                 class="w-full rounded-lg border site-border px-3 py-2 text-sm site-text" dir="ltr">
        </div>
      </div>

      <div class="space-y-1.5">
        <label class="block text-sm font-semibold site-text">رابط التحديث</label>
        <input type="url" name="store_url" value="{{ initial.store_url }}" placeholder="https://..."
               class="w-full rounded-lg border site-border px-3 py-2 text-sm site-text" dir="ltr">
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="space-y-1.5">
          <label class="block text-sm font-semibold site-text">رسالة التحديث عربي</label>
          <textarea name="update_message_ar" rows="3"
                    class="w-full rounded-lg border site-border px-3 py-2 text-sm site-text">{{ initial.update_message_ar }}</textarea>
        </div>
        <div class="space-y-1.5">
          <label class="block text-sm font-semibold site-text">رسالة التحديث إنجليزي</label>
          <textarea name="update_message_en" rows="3" dir="ltr"
                    class="w-full rounded-lg border site-border px-3 py-2 text-sm site-text">{{ initial.update_message_en }}</textarea>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="space-y-1.5">
          <label class="block text-sm font-semibold site-text">ملاحظات النسخة عربي</label>
          <textarea name="release_notes_ar" rows="3"
                    class="w-full rounded-lg border site-border px-3 py-2 text-sm site-text">{{ initial.release_notes_ar }}</textarea>
        </div>
        <div class="space-y-1.5">
          <label class="block text-sm font-semibold site-text">ملاحظات النسخة إنجليزي</label>
          <textarea name="release_notes_en" rows="3" dir="ltr"
                    class="w-full rounded-lg border site-border px-3 py-2 text-sm site-text">{{ initial.release_notes_en }}</textarea>
        </div>
      </div>

      <div class="flex flex-wrap gap-6 pt-1">
        <label class="inline-flex items-center gap-2 text-sm site-text">
          <input type="checkbox" name="force_update" {% if initial.force_update %}checked{% endif %}
                 class="rounded border site-border">
          <span>تحديث إجباري</span>
        </label>
        <label class="inline-flex items-center gap-2 text-sm site-text">
          <input type="checkbox" name="is_active" {% if initial.is_active %}checked{% endif %}
                 class="rounded border site-border">
          <span>فعّالة</span>
        </label>
      </div>
      <p class="text-[11px] site-text-muted">
        عند تفعيل هذه النسخة سيتم تعطيل النسخة الفعّالة السابقة لنفس المنصة تلقائيًا.
      </p>

      <div class="pt-2 flex gap-2">
        <button type="submit" class="site-btn-primary px-5 py-2 rounded-full text-sm font-bold">
          {% if mode == 'create' %}إضافة النسخة{% else %}حفظ التعديلات{% endif %}
        </button>
        <a href="{% url 'dashboard:mobile_version_list' %}"
           class="inline-flex items-center px-4 py-2 rounded-full border site-border text-sm font-bold site-text-muted">
          إلغاء
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
