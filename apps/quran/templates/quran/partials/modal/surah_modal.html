{% load i18n %}

<div id="surahModal"
     class="fixed inset-0 z-[10000] bg-black/40 hidden items-center justify-center p-3 sm:p-4">

  <div class="quran-index-modal w-full max-w-5xl bg-white rounded-3xl shadow-2xl border border-gray-100 relative"
       dir-text>

    <div class="px-4 sm:px-6 pt-5 sm:pt-6 pb-4 border-b">
      <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">

        <div class="flex items-center justify-between gap-3">
          <div class="flex items-center gap-3">
            <div class="text-emerald-600 text-3xl">
              <i class="bi bi-journal-richtext"></i>
            </div>

            <span class="font-semibold text-lg md:text-xl text-gray-900">
              الفهرس
            </span>
          </div>

          <button onclick="toggleMenu()"
                  class="sm:hidden text-3xl leading-none text-gray-500 hover:text-black transition"
                  aria-label="إغلاق">
            ×
          </button>
        </div>

        <div class="relative w-full sm:w-64">
          <input id="surahSearch"
                 type="text"
                 placeholder="ابحث عن سورة أو جزء"
                 class="w-full border rounded-full pl-8 pr-3 py-1.5 text-sm
                        focus:outline-none focus:ring-1 focus:ring-emerald-500 focus:border-emerald-500">
          <span class="absolute left-2 top-1/2 -translate-y-1/2 text-gray-400 text-sm">
            🔍
          </span>
        </div>

        <button onclick="toggleMenu()"
                class="hidden sm:block text-3xl md:text-4xl leading-none text-gray-500 hover:text-black transition"
                aria-label="إغلاق">
          ×
        </button>

      </div>
    </div>

    <div class="px-4 sm:px-6 pb-5 sm:pb-6 pt-4 overflow-y-auto">
      <div class="mb-4 inline-flex w-full rounded-2xl bg-gray-100 p-1">
        <button
          type="button"
          data-index-tab="surahs"
          class="quran-index-tab flex-1 rounded-xl px-4 py-2 text-sm font-bold transition bg-white text-emerald-700 shadow-sm">
          السور
        </button>
        <button
          type="button"
          data-index-tab="juzs"
          class="quran-index-tab flex-1 rounded-xl px-4 py-2 text-sm font-bold text-gray-600 transition hover:text-emerald-700">
          الأجزاء
        </button>
      </div>

      <div id="surahGridWrapper" class="quran-index-panel" data-index-panel="surahs">

        <div id="surahGrid"
             class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-8
                    gap-3 sm:gap-4 justify-items-stretch">

          {% for surah in surahs %}
          <button
            type="button"
            onclick="goToSurah({{ surah.number }})"
            data-index-name="{% translate surah.i18n_key %} سورة {{ surah.number }} {{ surah.number }}"
            class="group focus:outline-none">

            <div class="flex items-center justify-center gap-2
                        min-h-10 w-full px-3 py-2
                        rounded-2xl border border-gray-200
                        bg-white text-gray-900
                        text-[12px] font-bold
                        group-hover:bg-emerald-50
                        group-hover:border-emerald-400
                        group-hover:text-emerald-800
                        transition">

              <span class="text-[11px] font-bold">
                {{ surah.number }}
              </span>

              <span>
                {% translate surah.i18n_key %}
              </span>

            </div>

          </button>
          {% endfor %}

        </div>

      </div>

      <div id="juzGridWrapper" class="quran-index-panel hidden" data-index-panel="juzs">
        <div id="juzGrid"
             class="grid grid-cols-1 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 sm:gap-4">
          {% for juz in juzs %}
          <button
            type="button"
            onclick="goToJuz({{ juz.first_page }})"
            data-index-name="{{ juz.search_terms }}"
            class="group focus:outline-none">

            <div class="flex min-h-12 w-full items-center justify-center gap-2
                        rounded-2xl border border-gray-200 bg-white px-4 py-3
                        text-sm font-bold text-gray-900 transition
                        group-hover:bg-emerald-50
                        group-hover:border-emerald-400
                        group-hover:text-emerald-800">
              <span>{{ juz.label }}</span>
            </div>

          </button>
          {% endfor %}
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  function goToSurah(surahNumber) {
    var mushafKey = "{{ current_mushaf|escapejs }}";
    var url = "/quran/" + encodeURIComponent(mushafKey) + "/surah/" + surahNumber + "/";
    window.location.href = url;
  }

  function goToJuz(pageNumber) {
    var mushafKey = "{{ current_mushaf|escapejs }}";
    var url = "/quran/" + encodeURIComponent(mushafKey) + "/page/" + pageNumber + "/";
    window.location.href = url;
  }
</script>
