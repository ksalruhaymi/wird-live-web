{% load i18n %}

<div
  id="recitationCorrectionResultCard"
  class="hifz-side-panel hifz-recitation-panel w-full"
>
  <div class="hifz-panel-header hifz-panel-header--recitation">
    <div class="hifz-panel-header-side hifz-panel-header-side--start">
      <div class="hifz-panel-icon-badge hifz-panel-icon-badge--emerald">
        <i class="bi bi-mic-fill"></i>
      </div>
    </div>

    <div class="hifz-panel-header-copy">
      <div class="hifz-panel-title">{% trans "recitation_correction" %}</div>
      <div class="hifz-panel-subtitle">{% trans "recitation_correction_subtitle" %}</div>
    </div>

    <div class="relative hifz-panel-header-side hifz-panel-header-side--end hifz-recitation-header-actions">
      <button
        type="button"
        class="hifz-help-toggle hifz-panel-help-btn"
        data-popover-target="recitationHelpPopover"
        aria-label="{% trans 'help' %}">
        <i class="bi bi-question-lg"></i>
      </button>

<div
        id="recitationHelpPopover"
        class="hifz-help-popover absolute right-0 top-12 z-30 hidden w-56 rounded-2xl border border-gray-200 bg-white p-3 text-xs leading-6 text-gray-600 shadow-lg"
      >
        {% trans "recitation_correction_help" %}
      </div>
    </div>
  </div>

  <div class="hifz-recitation-score-card">
    <div id="recitationResultAyahText" class="hidden"></div>

    <div class="hifz-recitation-score-grid">
      <div class="hifz-recitation-score-copy">
        <div class="hifz-recitation-score-label">{% trans "recitation_accuracy_percentage" %}</div>
        <div id="recitationAnalysisResult" class="hidden"></div>
      </div>

      <div class="hifz-recitation-score-ring-wrap">
        <div id="recitationScoreRing" class="hifz-recitation-score-ring" style="--score: 0;">
          <div id="recitationScoreText">0%</div>
        </div>
      </div>
    </div>

    <div id="recitationExpectedText" class="hidden"></div>
  </div>

  <div class="hifz-recitation-result-wrap">
    <div class="hifz-recitation-result-head">
      <span class="hifz-recitation-result-title">{% trans "recitation_result" %}</span>
      <span class="hifz-recitation-result-star" aria-hidden="true">
        <i class="bi bi-stars"></i>
      </span>
    </div>

    <div
      id="recitationRecognizedText"
      class="hifz-recitation-result-box"
    >{% trans "recitation_no_result_yet" %}</div>
  </div>

  <span id="hifzRecitationI18n" class="hidden"
        data-no-result="{% trans 'recitation_no_result_yet' %}"></span>

  <div id="recitationErrorWords" class="hidden"></div>

  <div class="hifz-recitation-actions">
    <button id="playShaykhAudioBtn" class="hifz-recitation-btn hifz-recitation-btn--dark">
      <i class="bi bi-volume-up-fill"></i>
      <span>{% trans "shaykh_audio" %}</span>
    </button>

    <button id="playUserAudioBtn" class="hifz-recitation-btn hifz-recitation-btn--green">
      <i class="bi bi-mic-fill"></i>
      <span>{% trans "my_recorded_audio" %}</span>
    </button>
  </div>

  <audio id="shaykhCompareAudio" class="hidden"></audio>
  <audio id="userCompareAudio" class="hidden"></audio>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const scoreText = document.getElementById("recitationScoreText");
  const scoreRing = document.getElementById("recitationScoreRing");
  if (!scoreText || !scoreRing) return;

  function syncRecitationScoreVisual() {
    const raw = parseInt((scoreText.textContent || "0").replace(/[^\d]/g, ""), 10);
    const score = Number.isFinite(raw) ? Math.max(0, Math.min(100, raw)) : 0;
    scoreRing.style.setProperty("--score", String(score));
    scoreRing.setAttribute("data-score", String(score));
  }

  syncRecitationScoreVisual();
  new MutationObserver(syncRecitationScoreVisual).observe(scoreText, {
    childList: true,
    subtree: true,
    characterData: true,
  });
});
</script>
