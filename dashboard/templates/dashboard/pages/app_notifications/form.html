{% extends "dashboard/layouts/base.html" %}

{% block dashboard_content %}
<div class="max-w-2xl mx-auto space-y-5" dir-text>

  <div class="flex items-start justify-between gap-3">
    <h1 class="site-title-md">{{ title }}</h1>
    <a href="{% url 'dashboard:app_notification_list' %}" class="text-[12px] site-link-primary font-semibold hover:underline">العودة</a>
  </div>

  <div class="site-card p-5 md:p-6">
    <form method="post" class="space-y-4">
      {% csrf_token %}

      <div class="space-y-1.5">
        <label class="block text-sm font-semibold site-text">العنوان</label>
        <input type="text" name="title" value="{{ initial.title }}" required
               class="w-full rounded-lg border site-border px-3 py-2 text-sm site-text">
      </div>

      <div class="space-y-1.5">
        <label class="block text-sm font-semibold site-text">نص التنبيه</label>
        <textarea name="body" rows="5" required
                  class="w-full rounded-lg border site-border px-3 py-2 text-sm site-text">{{ initial.body }}</textarea>
      </div>

      <div class="space-y-1.5">
        <label class="block text-sm font-semibold site-text">الفئة المستهدفة</label>
        <select name="target_type" class="w-full rounded-lg border site-border px-3 py-2 text-sm site-text">
          {% for value, label in target_type_choices %}
          <option value="{{ value }}" {% if initial.target_type == value %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>

      <label class="inline-flex items-center gap-2 text-sm site-text">
        <input type="checkbox" name="is_active" {% if initial.is_active %}checked{% endif %}
               class="rounded border site-border">
        <span>مفعّل (يظهر في التطبيق)</span>
      </label>

      <div class="pt-2">
        <button type="submit" class="site-btn-primary px-5 py-2 rounded-full text-sm font-bold">
          {% if mode == 'create' %}إنشاء{% else %}حفظ التعديلات{% endif %}
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
