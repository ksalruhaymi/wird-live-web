{% extends "dashboard/layouts/base.html" %}

{% block dashboard_content %}
<div class="max-w-2xl mx-auto space-y-5" dir-text>

  <div class="flex items-start justify-between gap-3">
    <div>
      <h1 class="site-title-md flex items-center gap-2">
        <i class="bi bi-credit-card site-link-primary text-xl"></i>
        <span>{{ title }}</span>
      </h1>
      <p class="site-text-muted mt-1 text-sm">
        عبئة بيانات الباقة ثم احفظ التغييرات.
      </p>
    </div>
    <a href="{% url 'dashboard:subscription_plan_list' %}"
       class="text-[12px] site-link-primary font-semibold hover:underline">
      العودة للقائمة
    </a>
  </div>

  <div class="site-card p-5 md:p-6">
    <form method="post" class="space-y-5">
      {% csrf_token %}

      <div class="space-y-1.5">
        <label class="block text-sm font-semibold site-text">اسم الباقة</label>
        <input type="text" name="title" value="{{ initial.title }}"
               class="w-full rounded-lg border site-border px-3 py-2 text-sm site-text"
               required>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="space-y-1.5">
          <label class="block text-sm font-semibold site-text">المدة (بالأشهر)</label>
          <input type="number" name="duration_months" min="1" step="1"
                 value="{{ initial.duration_months }}"
                 class="w-full rounded-lg border site-border px-3 py-2 text-sm site-text"
                 required>
        </div>

        <div class="space-y-1.5">
          <label class="block text-sm font-semibold site-text">المبلغ (ريال)</label>
          <input type="text" name="price" inputmode="decimal"
                 value="{{ initial.price }}"
                 class="w-full rounded-lg border site-border px-3 py-2 text-sm site-text"
                 required>
        </div>

        <div class="space-y-1.5">
          <label class="block text-sm font-semibold site-text">دقائق الباقة</label>
          <input type="number" name="minutes" min="0" step="1"
                 value="{{ initial.minutes }}"
                 placeholder="مثلاً: 120"
                 class="w-full rounded-lg border site-border px-3 py-2 text-sm site-text"
                 required>
        </div>
      </div>

      <div class="space-y-1.5">
        <label class="block text-sm font-semibold site-text">وصف الباقة</label>
        <textarea name="description" rows="6"
                  placeholder="اكتب وصف الباقة هنا..."
                  class="w-full rounded-lg border site-border px-3 py-2.5 text-sm site-text leading-relaxed resize-y min-h-[9rem]">{{ initial.description }}</textarea>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="space-y-1.5">
          <label class="block text-sm font-semibold site-text">ترتيب العرض</label>
          <input type="number" name="sort_order" min="0" step="1"
                 value="{{ initial.sort_order }}"
                 class="w-full rounded-lg border site-border px-3 py-2 text-sm site-text">
        </div>

        <div class="flex items-center gap-2 pt-6">
          <input type="checkbox" name="is_active" id="is_active"
                 class="rounded border site-border"
                 {% if initial.is_active %}checked{% endif %}>
          <label for="is_active" class="text-sm font-semibold site-text">باقة مفعّلة</label>
        </div>
      </div>

      <div class="flex items-center justify-end gap-2 pt-2">
        <a href="{% url 'dashboard:subscription_plan_list' %}"
           class="inline-flex items-center gap-2 px-4 py-2 rounded-full border site-border text-[12px] font-bold site-text-muted hover:site-surface transition">
          إلغاء
        </a>
        <button type="submit"
                class="inline-flex items-center gap-2 px-5 py-2 rounded-full site-btn-primary text-[12px] font-bold shadow-sm hover:shadow-md active:scale-95 transition">
          <i class="bi bi-check-lg"></i>
          حفظ
        </button>
      </div>
    </form>
  </div>

</div>
{% endblock %}
