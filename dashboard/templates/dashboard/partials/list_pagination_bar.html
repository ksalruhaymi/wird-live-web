{# Expects: total_count, per_page, pagination_hidden_fields (optional list of {name, value}) #}
<div class="flex items-center justify-between gap-4 flex-wrap">
  <div class="flex-1 min-w-[140px]">
    {% include "web/components/pagination_total.html" with total_count=total_count %}
  </div>
  <div class="text-[11px] site-text-muted">
    <form method="get" class="flex items-center gap-2 flex-wrap">
      {% if pagination_hidden_fields %}
        {% for field in pagination_hidden_fields %}
          <input type="hidden" name="{{ field.name }}" value="{{ field.value }}">
        {% endfor %}
      {% endif %}
      <label class="site-text-muted">عدد الصفوف في الصفحة:</label>
      <select name="per_page"
              class="border rounded-sm border-gray-300 px-2 py-1 text-[14px]"
              onchange="this.form.submit()">
        <option value="5" {% if per_page == "5" %}selected{% endif %}>5</option>
        <option value="10" {% if per_page == "10" %}selected{% endif %}>10</option>
        <option value="100" {% if per_page == "100" %}selected{% endif %}>100</option>
        <option value="all" {% if per_page == "all" %}selected{% endif %}>الكل</option>
      </select>
    </form>
  </div>
</div>
