{% extends "dashboard/layouts/base.html" %}

{% block dashboard_content %}
<div class="max-w-2xl mx-auto space-y-5" dir-text>

  <div class="flex items-start justify-between gap-3">
    <h1 class="site-title-md">{{ title }}</h1>
    <a href="{% url 'dashboard:announcement_list' %}" class="text-[12px] site-link-primary font-semibold hover:underline">العودة</a>
  </div>

  <div class="site-card p-5 md:p-6">
    <form method="post" enctype="multipart/form-data" class="space-y-4">
      {% csrf_token %}

      <div class="space-y-1.5">
        <label class="block text-sm font-semibold site-text">صورة الإعلان</label>
        {% if announcement and announcement.image %}
        <div class="mb-2">
          <img src="{{ announcement.image.url }}" alt="الصورة الحالية"
               class="max-h-40 rounded-lg border site-border object-contain">
          <p class="text-[11px] site-text-muted mt-1">الصورة الحالية — اترك الحقل فارغاً للإبقاء عليها.</p>
        </div>
        {% endif %}
        <input type="file" name="image" accept="image/*"
               class="w-full rounded-lg border site-border px-3 py-2 text-sm site-text"
               {% if mode == 'create' %}required{% endif %}>
      </div>

      <label class="inline-flex items-center gap-2 text-sm site-text cursor-pointer">
        <input type="checkbox" name="is_active" class="rounded border site-border"
               {% if initial.is_active %}checked{% endif %}>
        <span>مفعّل (يظهر في التطبيق)</span>
      </label>

      <div class="flex gap-3 pt-2">
        <button type="submit" class="px-5 py-2 rounded-full site-btn-primary text-sm font-bold">حفظ</button>
        <a href="{% url 'dashboard:announcement_list' %}" class="px-5 py-2 rounded-full border site-border text-sm site-text-muted">إلغاء</a>
      </div>
    </form>
  </div>

</div>
{% endblock %}
