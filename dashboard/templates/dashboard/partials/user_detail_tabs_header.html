{% with base_url=detail_base_url %}
<nav class="flex flex-wrap gap-2 border-b site-border pb-3">
  <a href="{{ base_url }}?tab=profile"
     class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-[12px] font-bold transition
            {% if tab == 'profile' %}site-btn-primary{% else %}site-surface site-text-muted hover:site-text{% endif %}">
    <i class="bi bi-person-lines-fill"></i>
    البيانات
  </a>
  <a href="{{ base_url }}?tab=sessions"
     class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-[12px] font-bold transition
            {% if tab == 'sessions' %}site-btn-primary{% else %}site-surface site-text-muted hover:site-text{% endif %}">
    <i class="bi bi-collection-play"></i>
    الجلسات
  </a>
  <a href="{{ base_url }}?tab=calls"
     class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-[12px] font-bold transition
            {% if tab == 'calls' %}site-btn-primary{% else %}site-surface site-text-muted hover:site-text{% endif %}">
    <i class="bi bi-telephone"></i>
    سجل المكالمات
  </a>
  <a href="{{ base_url }}?tab=evaluations"
     class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-[12px] font-bold transition
            {% if tab == 'evaluations' %}site-btn-primary{% else %}site-surface site-text-muted hover:site-text{% endif %}">
    <i class="bi bi-star"></i>
    تقييم الجلسات
  </a>
  {% if show_subscriptions_tab %}
  <a href="{{ base_url }}?tab=subscriptions"
     class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-[12px] font-bold transition
            {% if tab == 'subscriptions' %}site-btn-primary{% else %}site-surface site-text-muted hover:site-text{% endif %}">
    <i class="bi bi-journal-text"></i>
    الاشتراكات
  </a>
  {% endif %}
</nav>
{% endwith %}
