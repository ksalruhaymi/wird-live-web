{# quran/partials/modal/tafsir_modal.html #}
{% load static i18n %}

<div id="tafsirModal"
     onclick="closeTafsirOutside(event)"
     class="fixed inset-0 bg-black/40 z-40 hidden items-center justify-center">

  <div class="w-full max-w-5xl mx-4 bg-white rounded-3xl shadow-2xl border border-gray-100 relative"
       dir-text>

    <div class="px-6 pt-6 pb-3 border-b">
      <div class="flex items-center justify-between gap-4">

        <div class="flex items-center gap-3">
          <div class="flex items-center justify-center text-amber-500 text-3xl">
            <i class="bi bi-journal-bookmark"></i>
          </div>

          <span class="font-semibold text-base md:text-lg text-gray-900">
            {% trans "tafasir" %}
            {% if current_mushaf_label %}
              <span class="text-sm text-gray-500">
                ({{ current_mushaf_label }})
              </span>
            {% endif %}
          </span>
        </div>

        <button onclick="toggleTafsirModal()"
                class="text-3xl leading-none text-gray-500 hover:text-black transition">
          ×
        </button>

      </div>
    </div>

    <div class="px-8 py-8">

      {% if tafasir and tafasir|length > 0 %}

      <div class="flex flex-wrap justify-center gap-10">

        {% for t in tafasir %}
        <button
          type="button"
          onclick="selectTafsir('{{ t.lang }}')"
          class="flex flex-col items-center text-center group"
          data-tafsir="{{ t.lang }}">

          <div class="w-24 h-24 rounded-full overflow-hidden border
                      {% if current_tafsir_key == t.lang %}
                        border-amber-500
                      {% else %}
                        border-gray-200
                      {% endif %}
                      group-hover:border-amber-500 transition duration-200 bg-white flex items-center justify-center">

            <div class="w-full h-full flex items-center justify-center text-amber-500 text-3xl">
              <i class="bi bi-book"></i>
            </div>

          </div>

          <span class="mt-3 text-base font-semibold
                       {% if current_tafsir_key == t.lang %}
                         text-amber-600
                       {% else %}
                         text-gray-800
                       {% endif %}
                       group-hover:text-amber-600 transition">
            {{ t.name }}
          </span>

        </button>
        {% endfor %}

      </div>

      {% else %}
      <div class="text-center text-sm text-gray-500 py-6">
        {% trans "no_tafsir_available" %}
      </div>
      {% endif %}

    </div>

  </div>
</div>
