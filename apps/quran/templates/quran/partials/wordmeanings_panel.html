{% load i18n %}

<!-- Toggle -->
<div class="flex items-center gap-2 mt-2">
  <input id="toggleWordPanel"
         type="checkbox"
         checked
         class="accent-emerald-600 cursor-pointer">
  <span id="toggleWordLabel" class="text-sm text-gray-700">
  {% trans "hide_word_meanings" %}
  </span>
</div>

<!-- Word meanings box -->
<div id="wordPanel"
     class="mt-2 rounded-lg border border-gray-200 bg-white p-4 shadow-sm">

  <div class="flex items-center gap-2 mb-3">
    <i class="bi bi-book text-emerald-600"></i>
    <span class="font-bold text-gray-900 text-sm">
      {% trans "word_meanings" %}
    </span>
  </div>

  <div id="wordContent"
       class="text-sm text-gray-700 leading-loose max-h-[140px] overflow-y-auto">
       
    <div class="text-gray-400 text-center py-4">
       
    </div>

  </div>

</div>

<script>
  const toggle = document.getElementById("toggleWordPanel");
  const panel = document.getElementById("wordPanel");
  const label = document.getElementById("toggleWordLabel");

  if (toggle && panel && label) {
    toggle.addEventListener("change", function () {
      if (this.checked) {
        panel.classList.remove("hidden");
        label.textContent = window.TRANSLATIONS.hideWordMeanings;
      } else {
        panel.classList.add("hidden");
        label.textContent = window.TRANSLATIONS.showWordMeanings;
      }
    });
  }
</script>
