{% extends "dashboard/layouts/base.html" %}

{% block dashboard_content %}
<div class="max-w-2xl mx-auto space-y-5" dir-text>

  <div class="flex items-start justify-between gap-3">
    <h1 class="site-title-md">{{ title }}</h1>
    <a href="{% url 'dashboard:session_evaluation_list' %}?tab=settings"
       class="text-[12px] site-link-primary font-semibold hover:underline">العودة</a>
  </div>

  <div class="site-card p-5 md:p-6">
    <form method="post" class="space-y-4">
      {% csrf_token %}

      <div class="space-y-1.5">
        <label class="block text-sm font-semibold site-text">نوع التقييم</label>
        <select name="category"
                class="w-full rounded-lg border site-border px-3 py-2 text-sm site-text">
          {% for value, label in category_choices %}
          <option value="{{ value }}" {% if initial.category == value %}selected{% endif %}>
            {{ label }}
          </option>
          {% endfor %}
        </select>
      </div>

      <div class="space-y-1.5">
        <label class="block text-sm font-semibold site-text">نص السؤال</label>
        <textarea name="question_text" rows="3" required
                  class="w-full rounded-lg border site-border px-3 py-2 text-sm site-text">{{ initial.question_text }}</textarea>
      </div>

      <div class="space-y-1.5">
        <label class="block text-sm font-semibold site-text">الترتيب</label>
        <input type="number" name="order" min="1" value="{{ initial.order }}"
               class="w-full rounded-lg border site-border px-3 py-2 text-sm site-text">
      </div>

      <div class="flex gap-3 pt-2">
        <button type="submit" class="px-5 py-2 rounded-full site-btn-primary text-sm font-bold">حفظ</button>
        <a href="{% url 'dashboard:session_evaluation_list' %}?tab=settings"
           class="px-5 py-2 rounded-full border site-border text-sm site-text-muted">إلغاء</a>
      </div>
    </form>
  </div>

</div>
{% endblock %}
