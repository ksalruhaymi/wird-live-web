{% load i18n %}

<div id="wordMeaningsPopover"
     class="hidden fixed z-[10020] w-[260px] max-w-[85vw] rounded-xl border border-gray-200 bg-white shadow-xl">

  <div class="flex items-center justify-between gap-3 px-4 py-3 border-b border-gray-100">
    <div>
      <div class="text-sm font-bold text-gray-900">
        {% trans "word_meanings" %}
      </div>
      <div id="wordMeaningsMeta" class="text-[11px] text-gray-500 mt-1"></div>
    </div>

    <button type="button"
            onclick="closeWordMeaningsPopover()"
            class="text-gray-400 hover:text-gray-700 text-xl leading-none">
      ×
    </button>
  </div>

  <div id="wordMeaningsLoading"
       class="hidden px-4 py-6 text-center text-sm text-gray-500">
    {% trans "loading" %}
  </div>

  <div id="wordMeaningsError"
       class="hidden px-4 py-6 text-center text-sm text-red-500"></div>

  <div id="wordMeaningsList"
       class="max-h-[260px] overflow-y-auto px-4 py-2 space-y-3"></div>
</div>
