{% load i18n %}

<div id="shortTafsirPopover"
     class="hidden fixed z-[10021] w-[240px] max-w-[80vw] rounded-lg border border-gray-200 bg-white shadow-lg">

  <div class="flex items-center justify-between gap-3 px-4 py-3 border-b border-gray-100">
    <div>
      <div class="text-sm font-bold text-gray-900">
        {% trans "brief_tafsir" %}
      </div>
      <div id="shortTafsirMeta" class="text-[11px] text-gray-500 mt-1"></div>
    </div>

    <button type="button"
            onclick="closeShortTafsirPopover()"
            class="text-gray-400 hover:text-gray-700 text-xl leading-none">
      ×
    </button>
  </div>

  <div id="shortTafsirLoading"
       class="hidden px-4 py-5 text-center text-sm text-gray-500">
    {% trans "loading" %}
  </div>

  <div id="shortTafsirError"
       class="hidden px-4 py-5 text-center text-sm text-red-500"></div>

  <div id="shortTafsirBody"
       class="max-h-[320px] overflow-y-auto px-4 py-3 space-y-3">
    <div id="shortTafsirAyahText"
         class="hidden text-sm leading-7 text-emerald-700 font-semibold"></div>

    <div id="shortTafsirText"
         class="text-[13px] leading-6 text-black text-justify"></div>
  </div>
</div>
