{% load i18n %}

<div id="mushafModal"
     class="fixed inset-0 bg-black/40 z-40 hidden items-center justify-center">

  <div class="w-full max-w-md mx-4 bg-white rounded-3xl shadow-2xl border border-gray-100 relative"
       dir-text>

    <div class="px-6 pt-6 pb-3 border-b">
      <div class="flex items-center justify-between gap-4">

        <div class="flex items-center gap-3">
          <div class="flex items-center justify-center text-indigo-500 text-3xl">
            <i class="bi bi-book"></i>
          </div>
          <span class="font-semibold text-base md:text-lg text-gray-900">
            {% trans "choose_mushaf" %}
          </span>
        </div>

        <button onclick="toggleMushafMenu()"
                class="text-3xl md:text-4xl leading-none text-gray-500 hover:text-black transition">
          ×
        </button>

      </div>
    </div>

    <div class="px-4 pb-5 pt-3">
      <div class="flex flex-col gap-2">
        {% for m in mushaf_list %}
        <a
          href="{% url 'quran:quran_mushaf_page' m.key current_page %}"
          class="w-full flex items-center justify-between px-4 py-2.5 rounded-xl border {% if m.key == mushaf_key %}border-indigo-500 bg-indigo-50 text-indigo-800{% else %}border-gray-200 bg-white text-gray-800 hover:bg-gray-50{% endif %} transition text-sm">

          <span>{% translate m.title_key %}</span>

          {% if m.key == mushaf_key %}
          <span class="text-xs text-indigo-600 flex items-center gap-1">
            <i class="bi bi-check-circle-fill"></i>
            {% trans "current" %}
          </span>
          {% endif %}
        </a>
        {% endfor %}
      </div>
    </div>

  </div>
</div>
