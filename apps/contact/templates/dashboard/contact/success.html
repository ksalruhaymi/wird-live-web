{% extends "web/layouts/base.html" %}

{% block title %}تم الإرسال{% endblock %}
{% block description %}تم إرسال رسالتك بنجاح{% endblock %}

{% block content %}
<section class="min-h-[60vh] flex items-center justify-center mt-20 py-16 px-4" dir-text>

  <div class="w-full max-w-xl">

    <div class="bg-white border border-slate-200 rounded-lg shadow-sm p-8 text-center space-y-5">

      <!-- Icon -->
      <div class="w-16 h-16 mx-auto rounded-full bg-emerald-100 flex items-center justify-center text-3xl">
        ✅
      </div>

      <!-- Title -->
      <h1 class="text-xl md:text-2xl font-extrabold text-slate-900">
        تم إرسال رسالتك بنجاح
      </h1>

      <!-- Message -->
      <p class="text-sm md:text-base text-slate-600 leading-relaxed">
        شكرًا لك، سنراجع رسالتك ونتواصل معك قريبًا.
      </p>

      <!-- Button -->
      <div class="pt-4">
        <a href="{% url 'web:home' %}"
           class="inline-flex items-center justify-center
                  px-6 py-2.5 rounded-lg
                  bg-blue-600 text-white text-sm font-semibold
                  hover:bg-blue-700">
          العودة إلى الصفحة الرئيسية
        </a>
      </div>

    </div>

  </div>
</section>
{% endblock %}
